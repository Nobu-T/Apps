<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>プランクタイマー</title>
    <!-- Tailwind CSS Play CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM UMD -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel Standalone -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@700&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
        }
        .timer-font {
            font-family: 'JetBrains Mono', monospace;
        }
        @keyframes ring-pulse {
            0% { transform: scale(1); opacity: 0.5; }
            100% { transform: scale(1.1); opacity: 0; }
        }
        .ring-animate {
            animation: ring-pulse 2s cubic-bezier(0, 0, 0.2, 1) infinite;
        }
    </style>
</head>
<body class="bg-slate-950">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const PlankTimer = () => {
            const [timeLeft, setTimeLeft] = useState(60);
            const [isActive, setIsActive] = useState(false);
            const [phase, setPhase] = useState('WORKOUT'); // 'WORKOUT' or 'REST'
            const [setCount, setSetCount] = useState(1);
            const [isFinished, setIsFinished] = useState(false);

            const timerRef = useRef(null);
            const audioContextRef = useRef(null);

            const TOTAL_SETS = 3;
            const WORKOUT_TIME = 60;
            const REST_TIME = 60;

            // Simple beep sound using Web Audio API
            const playBeep = (frequency = 440, duration = 0.1) => {
                try {
                    if (!audioContextRef.current) {
                        audioContextRef.current = new (window.AudioContext || window.webkitAudioContext)();
                    }
                    const ctx = audioContextRef.current;
                    if (ctx.state === 'suspended') ctx.resume();
                    
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.frequency.value = frequency;
                    gain.gain.setValueAtTime(0.1, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + duration);
                    osc.start();
                    osc.stop(ctx.currentTime + duration);
                } catch (e) {
                    console.error("Audio error", e);
                }
            };

            useEffect(() => {
                if (isActive && timeLeft > 0) {
                    timerRef.current = setInterval(() => {
                        setTimeLeft((prev) => prev - 1);
                        // Beep for last 3 seconds
                        if (timeLeft <= 4 && timeLeft > 1) {
                            playBeep(440, 0.1);
                        }
                    }, 1000);
                } else if (timeLeft === 0) {
                    handlePhaseEnd();
                }
                return () => clearInterval(timerRef.current);
            }, [isActive, timeLeft]);

            const handlePhaseEnd = () => {
                playBeep(880, 0.5);
                if (phase === 'WORKOUT') {
                    if (setCount < TOTAL_SETS) {
                        setPhase('REST');
                        setTimeLeft(REST_TIME);
                    } else {
                        setIsActive(false);
                        setIsFinished(true);
                    }
                } else {
                    setPhase('WORKOUT');
                    setSetCount((prev) => prev + 1);
                    setTimeLeft(WORKOUT_TIME);
                }
            };

            const toggleTimer = () => {
                if (isFinished) {
                    resetTimer();
                    return;
                }
                setIsActive(!isActive);
                if (!audioContextRef.current) {
                    audioContextRef.current = new (window.AudioContext || window.webkitAudioContext)();
                }
            };

            const resetTimer = () => {
                setIsActive(false);
                setPhase('WORKOUT');
                setSetCount(1);
                setTimeLeft(WORKOUT_TIME);
                setIsFinished(false);
                if (timerRef.current) clearInterval(timerRef.current);
            };

            const formatTime = (seconds) => {
                const m = Math.floor(seconds / 60);
                const s = seconds % 60;
                return `${m}:${s.toString().padStart(2, '0')}`;
            };

            const progress = phase === 'WORKOUT' 
                ? (1 - timeLeft / WORKOUT_TIME) * 100 
                : (1 - timeLeft / REST_TIME) * 100;

            return (
                <div className="min-h-screen flex flex-col items-center justify-center p-6 bg-slate-950 text-slate-200">
                    <div className="w-full max-w-sm bg-slate-900/50 backdrop-blur-xl border border-slate-800/50 rounded-[2.5rem] p-10 shadow-2xl relative overflow-hidden">
                        {/* Background Decoration */}
                        <div className={`absolute -top-24 -right-24 w-48 h-48 rounded-full blur-3xl opacity-20 transition-colors duration-1000 ${phase === 'WORKOUT' ? 'bg-orange-500' : 'bg-emerald-500'}`} />
                        
                        <div className="relative z-10">
                            <div className="text-center mb-10">
                                <h1 className="text-xs font-black text-slate-500 uppercase tracking-[0.3em] mb-4">Plank Session</h1>
                                <div className="flex justify-center gap-3">
                                    {[1, 2, 3].map((s) => (
                                        <div 
                                            key={s} 
                                            className={`h-1.5 w-10 rounded-full transition-all duration-700 ${
                                                s < setCount ? 'bg-emerald-500' : 
                                                s === setCount ? (phase === 'WORKOUT' ? 'bg-orange-500 shadow-[0_0_10px_rgba(249,115,22,0.5)]' : 'bg-emerald-500 animate-pulse') : 
                                                'bg-slate-800'
                                            }`}
                                        />
                                    ))}
                                </div>
                            </div>

                            <div className="relative flex flex-col items-center justify-center py-10">
                                {/* Circular Progress (Simple CSS version) */}
                                <div className="absolute inset-0 flex items-center justify-center">
                                    <div className={`w-64 h-64 rounded-full border-4 border-slate-800 flex items-center justify-center`}>
                                        {isActive && (
                                            <div className={`absolute inset-0 rounded-full border-4 ring-animate ${phase === 'WORKOUT' ? 'border-orange-500' : 'border-emerald-500'}`} />
                                        )}
                                    </div>
                                </div>

                                <div className={`text-xs font-bold mb-4 tracking-[0.2em] uppercase transition-colors duration-500 ${isFinished ? 'text-emerald-400' : phase === 'WORKOUT' ? 'text-orange-500' : 'text-emerald-500'}`}>
                                    {isFinished ? 'Session Complete' : phase === 'WORKOUT' ? `Set ${setCount} • Plank` : 'Resting'}
                                </div>
                                
                                <div className={`text-7xl font-black timer-font tabular-nums tracking-tighter transition-colors duration-500 ${isFinished ? 'text-emerald-400' : 'text-white'}`}>
                                    {isFinished ? 'DONE' : formatTime(timeLeft)}
                                </div>
                            </div>

                            <div className="flex flex-col gap-4 mt-12">
                                <button 
                                    onClick={toggleTimer}
                                    className={`w-full py-5 rounded-3xl text-lg font-bold transition-all active:scale-95 flex items-center justify-center gap-3 group ${
                                        isActive 
                                        ? 'bg-slate-800 text-slate-300 hover:bg-slate-700' 
                                        : isFinished 
                                            ? 'bg-emerald-600 text-white hover:bg-emerald-500'
                                            : 'bg-orange-500 text-white hover:bg-orange-400 shadow-xl shadow-orange-500/20'
                                    }`}
                                >
                                    {isActive ? (
                                        <>
                                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><rect width="4" height="16" x="6" y="4"/><rect width="4" height="16" x="14" y="4"/></svg>
                                            PAUSE
                                        </>
                                    ) : (
                                        <>
                                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className="group-hover:translate-x-0.5 transition-transform"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                                            {isFinished ? 'RESTART' : 'START'}
                                        </>
                                    )}
                                </button>
                                
                                <button 
                                    onClick={resetTimer}
                                    className="w-full py-3 rounded-2xl text-slate-600 font-bold hover:text-slate-400 transition-colors text-sm tracking-widest"
                                >
                                    RESET
                                </button>
                            </div>
                        </div>
                    </div>

                    <div className="mt-12 text-slate-600 text-[10px] text-center max-w-[200px] leading-relaxed uppercase tracking-widest font-medium">
                        3 Sets • 60s Work • 60s Rest<br/>
                        Stay strong, keep your core tight.
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<PlankTimer />);
    </script>
</body>
</html>
